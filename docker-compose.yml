version: "3.9"

services:
  db:
    image: postgres:16-alpine  # Use the Alpine version of PostgreSQL
    container_name: postgres-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: marketplace
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    image: migrate/migrate
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations
    command: [
      "-path", "/migrations",
      "-database", "postgres://postgres:postgres@db:5432/marketplace?sslmode=disable",
      "up"
    ]

  api:
    build: .
    depends_on:
      - migrate
    ports:
      - "8080:8080"